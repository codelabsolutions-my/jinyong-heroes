# Lint + test + build on every push/PR. 本项目是纯前端（TS + Vite + PixiJS，无后端），用 npm。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-guard:
    # Backstop for .claude/hooks/docs-guard.sh: architecture-significant changes
    # must land with a doc update in the same PR. Bypass: "[no-adr]" in PR title.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[no-adr]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require doc updates alongside architecture changes
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          sig=$(echo "$changed" | grep -E '^(src/game/|src/core/|\.github/workflows/|Dockerfile|Makefile|\.env\.example)' || true)
          docs=$(echo "$changed" | grep -E '^(CLAUDE\.md|AGENTS\.md|README\.md|docs/)' || true)
          if [ -n "$sig" ] && [ -z "$docs" ]; then
            echo "::error::Architecture-significant files changed without any doc update:"
            echo "$sig"
            echo "Update docs/DECISIONS.md (ADR row), CLAUDE.md, or README.md in this PR — or add [no-adr] to the PR title with justification."
            exit 1
          fi
          echo "docs-guard: OK"

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test # Vitest
      - run: npm run build # tsc --noEmit && vite build
