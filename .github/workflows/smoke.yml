# Fresh-clone smoke test（纯前端版）：从零装依赖 + 产线构建，抓这些回归：
#   - lockfile 缺依赖（npm ci 严格按 package-lock，缺了就炸）
#   - 构建期 TS/打包错误（tsc --noEmit + vite build）
# 无后端/无数据库/无 .env — 本项目是静态前端站点（见 CLAUDE §6）。
name: Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install from lockfile (from scratch)
        run: npm ci

      - name: Production build boots clean
        run: npm run build

      - name: Build output exists
        run: test -f dist/index.html
